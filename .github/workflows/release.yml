name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: recall-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-15
            artifact: recall-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: recall-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: recall-windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz recall
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/recall.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v[0-9]*' --sort=-version:refname | awk -v tag="$tag" '$0 != tag { print; exit }')"
          notes_args=()
          if [ -n "$previous_tag" ]; then
            notes_args=(--notes-start-tag "$previous_tag")
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            "${notes_args[@]}" \
            recall-*.tar.gz recall-*.zip
